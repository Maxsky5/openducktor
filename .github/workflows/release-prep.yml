name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 0.1.0)"
        required: true
        type: string
      release_channel:
        description: "Release channel"
        required: true
        type: choice
        default: stable
        options:
          - stable
          - beta

concurrency:
  group: release-prep
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.11
  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

jobs:
  prepare-release:
    name: Bump, commit, tag, and draft
    permissions:
      actions: write
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout default branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          persist-credentials: false

      - name: Validate release automation token
        env:
          RELEASE_AUTOMATION_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_AUTOMATION_TOKEN:-}" ]]; then
            echo "Missing RELEASE_AUTOMATION_TOKEN. Release prep refuses to push with the default GitHub token." >&2
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve release state
        id: release_state
        env:
          VERSION: ${{ inputs.version }}
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
        run: |
          set -euo pipefail
          TAG="v$VERSION"

          if [[ "$RELEASE_CHANNEL" == "beta" && ! "$VERSION" =~ - ]]; then
            echo "Beta releases must use a prerelease semver version, for example 0.4.0-beta.1." >&2
            exit 1
          fi

          if [[ "$RELEASE_CHANNEL" == "stable" && "$VERSION" =~ - ]]; then
            echo "Stable releases must not use a prerelease semver version." >&2
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally without a matching remote tag." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag_exists=false" >> "$GITHUB_OUTPUT"

      - name: Apply version bump
        if: steps.release_state.outputs.tag_exists != 'true'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          bun run release:version:set "$VERSION"
          bun install
          bun run release:version:check "$VERSION"

      - name: Verify release changes before commit/tag
        if: steps.release_state.outputs.tag_exists != 'true'
        run: |
          set -euo pipefail
          bun run typecheck
          bun run lint
          bun run test
          bun run build

      - name: Commit release bump
        if: steps.release_state.outputs.tag_exists != 'true'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u :/
          if git diff --cached --quiet; then
            echo "Release version bump did not change any tracked files." >&2
            exit 1
          fi
          git commit -m "chore(release): v$VERSION"

      - name: Create release tags
        if: steps.release_state.outputs.tag_exists != 'true'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git tag -a "v$VERSION" -m "OpenDucktor v$VERSION"

      - name: Push release commit and tags
        if: steps.release_state.outputs.tag_exists != 'true'
        env:
          DEFAULT_BRANCH: ${{ env.DEFAULT_BRANCH }}
          RELEASE_AUTOMATION_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${RELEASE_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --follow-tags origin HEAD:"$DEFAULT_BRANCH"

      - name: Create draft GitHub release
        id: draft_release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
          VERSION: ${{ inputs.version }}
          TAG: ${{ steps.release_state.outputs.tag }}
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            IS_DRAFT="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
            if [[ "$IS_DRAFT" != "true" ]]; then
              echo "Release $TAG already exists and is not a draft. Refusing to overwrite a published release." >&2
              exit 1
            fi
            IS_PRERELEASE="$(gh release view "$TAG" --json isPrerelease --jq '.isPrerelease')"
            if [[ "$RELEASE_CHANNEL" == "beta" && "$IS_PRERELEASE" != "true" ]]; then
              echo "Release $TAG already exists but is not marked as a prerelease." >&2
              exit 1
            fi
            if [[ "$RELEASE_CHANNEL" == "stable" && "$IS_PRERELEASE" != "false" ]]; then
              echo "Release $TAG already exists but is marked as a prerelease." >&2
              exit 1
            fi
            echo "status=verified" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RELEASE_ARGS=(--draft --title "OpenDucktor v$VERSION" --generate-notes)
          if [[ "$RELEASE_CHANNEL" == "beta" ]]; then
            RELEASE_ARGS+=(--prerelease)
          fi

          gh release create "$TAG" "${RELEASE_ARGS[@]}"
          echo "status=created" >> "$GITHUB_OUTPUT"

      - name: Resolve npm dist-tag
        id: npm_dist_tag
        env:
          RELEASE_CHANNEL: ${{ inputs.release_channel }}
        run: |
          set -euo pipefail
          case "$RELEASE_CHANNEL" in
            stable)
              echo "value=latest" >> "$GITHUB_OUTPUT"
              ;;
            beta)
              echo "value=beta" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported release channel: $RELEASE_CHANNEL" >&2
              exit 1
              ;;
          esac

      - name: Dispatch Electron desktop publish workflow
        env:
          DEFAULT_BRANCH: ${{ env.DEFAULT_BRANCH }}
          GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: gh workflow run release-desktop-electron.yml --ref "$DEFAULT_BRANCH" -f tag="v$VERSION"

      - name: Dispatch MCP publish workflow
        env:
          DEFAULT_BRANCH: ${{ env.DEFAULT_BRANCH }}
          GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
          VERSION: ${{ inputs.version }}
          NPM_DIST_TAG: ${{ steps.npm_dist_tag.outputs.value }}
        run: gh workflow run publish-mcp.yml --ref "$DEFAULT_BRANCH" -f tag="v$VERSION" -f npm_dist_tag="$NPM_DIST_TAG"

      - name: Dispatch web publish workflow
        env:
          DEFAULT_BRANCH: ${{ env.DEFAULT_BRANCH }}
          GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
          VERSION: ${{ inputs.version }}
          NPM_DIST_TAG: ${{ steps.npm_dist_tag.outputs.value }}
        run: gh workflow run publish-web.yml --ref "$DEFAULT_BRANCH" -f tag="v$VERSION" -f npm_dist_tag="$NPM_DIST_TAG"

      - name: Publish workflow summary
        env:
          DRAFT_RELEASE_STATUS: ${{ steps.draft_release.outputs.status }}
          VERSION: ${{ inputs.version }}
        run: |
          {
            echo "## Release prepared"
            echo
            echo "- Release commit created on default branch"
            echo "- Release tag pushed: v$VERSION"
            echo "- Release channel: ${{ inputs.release_channel }}"
            echo "- npm dist-tag: ${{ steps.npm_dist_tag.outputs.value }}"
            echo "- Draft GitHub release ${DRAFT_RELEASE_STATUS:-verified} with generated notes"
            echo "- Dispatched workflows: Release Desktop Electron, Publish MCP Package, Publish Web Package"
          } >> "$GITHUB_STEP_SUMMARY"
