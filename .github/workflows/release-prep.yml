name: Prepare Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 0.1.0)"
        required: true
        type: string

concurrency:
  group: release-prep
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.11
  CARGO_TERM_COLOR: always
  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

jobs:
  prepare-release:
    name: Bump, commit, tag, and draft
    permissions:
      actions: write
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0
    steps:
      - name: Checkout default branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          persist-credentials: false

      - name: Validate release automation token
        env:
          RELEASE_AUTOMATION_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${RELEASE_AUTOMATION_TOKEN:-}" ]]; then
            echo "Missing RELEASE_AUTOMATION_TOKEN. Release prep refuses to push with the default GitHub token." >&2
            exit 1
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev librsvg2-dev patchelf libayatana-appindicator3-dev

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve release state
        id: release_state
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          TAG="v$VERSION"

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists locally without a matching remote tag." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "tag_exists=false" >> "$GITHUB_OUTPUT"

      - name: Apply version bump
        if: steps.release_state.outputs.tag_exists != 'true'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          bun run release:version:set "$VERSION"
          bun install
          bun run release:version:check "$VERSION"

      - name: Verify release changes before commit/tag
        if: steps.release_state.outputs.tag_exists != 'true'
        run: |
          set -euo pipefail
          bun run typecheck
          bun run lint
          bun run test
          bun run build
          cargo rust-lint-host
          cargo rust-test-host-unit
          cargo rust-test-host-integration

      - name: Commit release bump
        if: steps.release_state.outputs.tag_exists != 'true'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u :/
          if git diff --cached --quiet; then
            echo "Release version bump did not change any tracked files." >&2
            exit 1
          fi
          git commit -m "chore(release): v$VERSION"

      - name: Create release tags
        if: steps.release_state.outputs.tag_exists != 'true'
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git tag -a "v$VERSION" -m "OpenDucktor v$VERSION"

      - name: Push release commit and tags
        if: steps.release_state.outputs.tag_exists != 'true'
        env:
          DEFAULT_BRANCH: ${{ env.DEFAULT_BRANCH }}
          RELEASE_AUTOMATION_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${RELEASE_AUTOMATION_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --follow-tags origin HEAD:"$DEFAULT_BRANCH"

      - name: Create draft GitHub release
        id: draft_release
        env:
          GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
          VERSION: ${{ inputs.version }}
          TAG: ${{ steps.release_state.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            IS_DRAFT="$(gh release view "$TAG" --json isDraft --jq '.isDraft')"
            if [[ "$IS_DRAFT" != "true" ]]; then
              echo "Release $TAG already exists and is not a draft. Refusing to overwrite a published release." >&2
              exit 1
            fi
            echo "status=verified" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          gh release create "$TAG" --draft --title "OpenDucktor v$VERSION" --generate-notes
          echo "status=created" >> "$GITHUB_OUTPUT"

      - name: Dispatch desktop publish workflow
        env:
          DEFAULT_BRANCH: ${{ env.DEFAULT_BRANCH }}
          GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: gh workflow run release-desktop.yml --ref "$DEFAULT_BRANCH" -f tag="v$VERSION"

      - name: Dispatch MCP publish workflow
        env:
          DEFAULT_BRANCH: ${{ env.DEFAULT_BRANCH }}
          GH_TOKEN: ${{ secrets.RELEASE_AUTOMATION_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: gh workflow run publish-mcp.yml --ref "$DEFAULT_BRANCH" -f tag="v$VERSION"

      - name: Publish workflow summary
        env:
          DRAFT_RELEASE_STATUS: ${{ steps.draft_release.outputs.status }}
          VERSION: ${{ inputs.version }}
        run: |
          {
            echo "## Release prepared"
            echo
            echo "- Release commit created on default branch"
            echo "- Release tag pushed: v$VERSION"
            echo "- Draft GitHub release ${DRAFT_RELEASE_STATUS:-verified} with generated notes"
            echo "- Dispatched workflows: Release Desktop, Publish MCP Package"
          } >> "$GITHUB_STEP_SUMMARY"
