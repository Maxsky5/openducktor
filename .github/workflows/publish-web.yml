name: Publish Web Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example v0.1.0)"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag }}
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.11

jobs:
  publish-web:
    name: Publish @openducktor/web
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout release tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.2
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Resolve release metadata
        id: release_meta
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Expected release tag like v0.1.0 or v0.1.0-rc.1." >&2
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify repository version matches tag
        run: bun run release:version:check "${{ steps.release_meta.outputs.version }}"

      - name: Build @openducktor/web
        run: bun run --filter @openducktor/web build

      - name: Verify web package contents
        run: bun run scripts/prepare-web-publish-packages.ts "${{ steps.release_meta.outputs.version }}"

      - name: Dry-run web package publishing
        working-directory: packages/openducktor-web
        run: npm publish --dry-run --access public

      - name: Publish web package
        working-directory: packages/openducktor-web
        run: npm publish --access public

      - name: Publish workflow summary
        env:
          TAG: ${{ inputs.tag }}
        run: |
          {
            echo "## Web package published"
            echo
            echo "- Tag: $TAG"
            echo "- Package: @openducktor/web"
          } >> "$GITHUB_STEP_SUMMARY"
