name: Publish Web Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example v0.1.0)"
        required: true
        type: string
      npm_dist_tag:
        description: "npm dist-tag to publish"
        required: true
        type: choice
        default: latest
        options:
          - latest
          - beta

concurrency:
  group: ${{ github.workflow }}-${{ inputs.tag }}
  cancel-in-progress: false

env:
  BUN_VERSION: 1.3.11

jobs:
  publish-web:
    name: Publish @openducktor/web
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6.0.2
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Resolve release metadata
        id: release_meta
        env:
          TAG: ${{ inputs.tag }}
          NPM_DIST_TAG: ${{ inputs.npm_dist_tag }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Expected release tag like v0.1.0 or v0.1.0-rc.1." >&2
            exit 1
          fi
          case "$NPM_DIST_TAG" in
            latest|beta) ;;
            *)
              echo "Unsupported npm dist-tag $NPM_DIST_TAG. Expected latest or beta." >&2
              exit 1
              ;;
          esac

          if [[ "$NPM_DIST_TAG" == "beta" && ! "$TAG" =~ - ]]; then
            echo "Publishing with npm dist-tag beta requires a prerelease tag, for example v0.4.0-beta.1." >&2
            exit 1
          fi
          if [[ "$NPM_DIST_TAG" == "latest" && "$TAG" =~ - ]]; then
            echo "Publishing a prerelease tag to npm latest is not allowed." >&2
            exit 1
          fi
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify repository version matches tag
        run: bun run release:version:check "${{ steps.release_meta.outputs.version }}"

      - name: Build @openducktor/web
        run: bun run --filter @openducktor/web build

      - name: Verify web package contents
        run: bun run scripts/prepare-web-publish-packages.ts "${{ steps.release_meta.outputs.version }}"

      - name: Dry-run web package publishing
        working-directory: packages/openducktor-web
        env:
          NPM_DIST_TAG: ${{ inputs.npm_dist_tag }}
        run: npm publish --dry-run --access public --tag "$NPM_DIST_TAG"

      - name: Publish web package
        working-directory: packages/openducktor-web
        env:
          NPM_DIST_TAG: ${{ inputs.npm_dist_tag }}
        run: npm publish --access public --tag "$NPM_DIST_TAG"

      - name: Publish workflow summary
        env:
          TAG: ${{ inputs.tag }}
        run: |
          {
            echo "## Web package published"
            echo
            echo "- Tag: $TAG"
            echo "- Package: @openducktor/web"
            echo "- npm dist-tag: ${{ inputs.npm_dist_tag }}"
          } >> "$GITHUB_STEP_SUMMARY"
