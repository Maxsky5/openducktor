name: Dependency Hygiene

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

jobs:
  knip-dependency-check:
    name: Knip Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run blocking dependency checks
        run: bun run deps:check

  outdated-report:
    name: Outdated Dependencies Report
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate outdated dependency report
        run: bun run deps:outdated > outdated-report.txt

      - name: Generate unused exports report
        run: bun run deps:unused:exports > unused-exports-report.txt

      - name: Publish report artifact
        uses: actions/upload-artifact@v6
        with:
          name: dependency-hygiene-reports
          path: |
            outdated-report.txt
            unused-exports-report.txt

      - name: Add report to workflow summary
        run: |
          {
            echo "## bun outdated"
            echo
            echo '```'
            cat outdated-report.txt
            echo '```'
            echo
            echo "## knip unused exports"
            echo
            echo '```'
            cat unused-exports-report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
