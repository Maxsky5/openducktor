name: Publish MCP Package

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example v0.1.0)"
        required: true
        type: string

env:
  BUN_VERSION: 1.3.11

jobs:
  publish-mcp:
    name: Publish @openducktor/mcp
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout MCP tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node for npm trusted publishing
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.0.2
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Validate MCP tag matches package version
        env:
          TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [[ ! "$TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Expected release tag like v0.1.0 or v0.1.0-rc.1." >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          PACKAGE_VERSION="$(bun --print 'JSON.parse(require("node:fs").readFileSync("packages/openducktor-mcp/package.json", "utf8")).version')"
          if [[ "$PACKAGE_VERSION" != "$VERSION" ]]; then
            echo "MCP package version $PACKAGE_VERSION does not match tag $TAG." >&2
            exit 1
          fi

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify MCP package
        run: |
          bun run --filter @openducktor/mcp typecheck
          bun run --filter @openducktor/mcp test
          bun run --filter @openducktor/mcp build

      - name: Publish package
        working-directory: packages/openducktor-mcp
        run: npm publish --access public

      - name: Publish workflow summary
        env:
          TAG: ${{ inputs.tag }}
        run: |
          {
            echo "## MCP package published"
            echo
            echo "- Tag: $TAG"
            echo "- Package: @openducktor/mcp"
          } >> "$GITHUB_STEP_SUMMARY"
