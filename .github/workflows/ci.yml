name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.11
  CARGO_TERM_COLOR: always

jobs:
  react-doctor:
    name: React Doctor
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run React Doctor
        uses: millionco/react-doctor@53fa4dffe837e0157fb850fef700fccaaec191ea # main
        with:
          project: "@openducktor/frontend"
          diff: ${{ github.base_ref }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  bun-quality:
    name: Bun Quality (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun download cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint workspaces
        run: bun run lint

      - name: Typecheck workspaces
        run: bun run typecheck

      - name: Test workspaces
        run: bun run test

      - name: Build workspaces
        run: bun run build

  typescript-cross-platform:
    name: TypeScript Cross-platform (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            runner: ubuntu-latest
          - label: macOS
            runner: macos-15
          - label: Windows
            runner: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun download cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify TypeScript host package
        run: |
          bun run --filter @openducktor/host lint
          bun run --filter @openducktor/host typecheck
          bun run --filter @openducktor/host test
          bun run --filter @openducktor/host build

      - name: Verify shared frontend package
        run: |
          bun run --filter @openducktor/frontend lint
          bun run --filter @openducktor/frontend typecheck
          bun run --filter @openducktor/frontend test
          bun run --filter @openducktor/frontend build

      - name: Verify MCP package
        run: |
          bun run --filter @openducktor/mcp lint
          bun run --filter @openducktor/mcp typecheck
          bun run --filter @openducktor/mcp test
          bun run --filter @openducktor/mcp build

      - name: Verify Web package
        run: |
          bun run --filter @openducktor/web lint
          bun run --filter @openducktor/web typecheck
          bun run --filter @openducktor/web test
          bun run --filter @openducktor/web build

      - name: Verify Electron package
        run: |
          bun run --filter @openducktor/electron lint
          bun run --filter @openducktor/electron typecheck
          bun run --filter @openducktor/electron test
          bun run --filter @openducktor/electron build

  electron-package:
    name: Electron Package (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            runner: ubuntu-latest
            artifact: electron-linux
          - label: macOS
            runner: macos-15
            artifact: electron-macos
          - label: Windows
            runner: windows-latest
            artifact: electron-windows

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun download cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Electron package
        run: bun run electron:package

      - name: Upload Electron artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: ${{ matrix.artifact }}
          path: |
            apps/electron/release/*.AppImage
            apps/electron/release/*.blockmap
            apps/electron/release/*.deb
            apps/electron/release/*.dmg
            apps/electron/release/*.exe
            apps/electron/release/*.zip
          if-no-files-found: error
          retention-days: 7

  tauri-rust-quality:
    name: Rust Workspace Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            apps/desktop/src-tauri

      - name: Pre-fetch Rust dependencies
        run: cargo rust-fetch

      - name: Lint host crates
        run: cargo rust-lint-host

      - name: Run host crate unit tests
        run: cargo rust-test-host-unit

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Run host-application integration tests
        run: cargo rust-test-host-integration

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev librsvg2-dev patchelf libayatana-appindicator3-dev

      - name: Lint Tauri app
        run: cargo rust-lint-tauri

      - name: Cross-platform config build check
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --locked --target x86_64-pc-windows-gnu -p host-infra-system

      - name: Run Tauri app tests
        run: cargo rust-test-tauri
