name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.11
  CARGO_TERM_COLOR: always

jobs:
  react-doctor:
    name: React Doctor
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Attach PR branch context for React Doctor diff mode
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: git checkout -B "$HEAD_REF"

      - name: Run React Doctor on changed desktop files
        uses: millionco/react-doctor@40b3f7dcc9f9ffbfd21393026d364f76af19b7e2 # main
        with:
          project: "@openducktor/desktop"
          diff: ${{ github.base_ref }}

  bun-quality:
    name: Bun Quality (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun download cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint workspaces
        run: bun run lint

      - name: Typecheck workspaces
        run: bun run typecheck

      - name: Test workspaces
        run: bun run test

      - name: Build workspaces
        run: bun run build

  tauri-rust-quality:
    name: Rust Workspace Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            apps/desktop/src-tauri

      - name: Pre-fetch Rust dependencies
        run: cargo rust-fetch

      - name: Lint host crates
        run: cargo rust-lint-host

      - name: Run host crate unit tests
        run: cargo rust-test-host-unit

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Run host-application integration tests
        run: cargo rust-test-host-integration

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev librsvg2-dev patchelf libayatana-appindicator3-dev

      - name: Lint Tauri app
        run: cargo rust-lint-tauri

      - name: Cross-platform config build check
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --locked --target x86_64-pc-windows-gnu -p host-infra-system

      - name: Run Tauri app tests
        run: cargo rust-test-tauri

  windows-web-host:
    name: Windows Web Host Build and Smoke
    runs-on: windows-2025
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          workspaces: |
            apps/desktop/src-tauri
          shared-key: windows-web-host

      - name: Build web host on Windows
        working-directory: apps/desktop/src-tauri
        run: cargo build -p openducktor-web-host --locked

      - name: Smoke test Windows web host routes
        shell: pwsh
        working-directory: apps/desktop/src-tauri
        run: |
          $ErrorActionPreference = "Stop"
          $backendPort = 14327
          $frontendOrigin = "http://127.0.0.1:1420"
          $controlToken = "ci-control-token"
          $appToken = "ci-app-token"
          $backendUrl = "http://127.0.0.1:$backendPort"
          $hostPath = Join-Path (Get-Location) "target\debug\openducktor-web-host.exe"
          if (-not (Test-Path $hostPath)) { throw "Web host binary was not built at $hostPath" }
          $stdoutLog = Join-Path $env:RUNNER_TEMP "web-host.stdout.log"
          $stderrLog = Join-Path $env:RUNNER_TEMP "web-host.stderr.log"
          $smokeFailed = $true

          $process = Start-Process -FilePath $hostPath -ArgumentList @(
            "--port", "$backendPort",
            "--frontend-origin", $frontendOrigin,
            "--control-token", $controlToken,
            "--app-token", $appToken
          ) -PassThru -NoNewWindow -RedirectStandardOutput $stdoutLog -RedirectStandardError $stderrLog

          try {
            $deadline = (Get-Date).AddSeconds(30)
            $ready = $false
            do {
              if ($process.HasExited) { throw "Web host exited before readiness with code $($process.ExitCode)" }
              try {
                $health = Invoke-RestMethod -Uri "$backendUrl/health" -Method Get -TimeoutSec 2
                if ($health.ok -eq $true) { $ready = $true; break }
              } catch {}
              Start-Sleep -Milliseconds 250
            } while ((Get-Date) -lt $deadline)
            if (-not $ready) { throw "Timed out waiting for /health" }

            $session = Invoke-WebRequest -Uri "$backendUrl/session" -Method Post -Headers @{ "x-openducktor-app-token" = $appToken } -TimeoutSec 5
            if ($session.StatusCode -ne 200) { throw "/session returned $($session.StatusCode)" }
            if (-not ($session.Headers["Set-Cookie"] -match "openducktor_web_session=.*HttpOnly")) {
              throw "/session did not set the expected HttpOnly session cookie"
            }

            $invokeBody = @{ forceRefresh = $false } | ConvertTo-Json -Compress
            $invoke = Invoke-WebRequest -Uri "$backendUrl/invoke/system_list_open_in_tools" -Method Post -Headers @{ "x-openducktor-app-token" = $appToken; "content-type" = "application/json" } -Body $invokeBody -TimeoutSec 10
            if ($invoke.StatusCode -ne 200) { throw "/invoke/system_list_open_in_tools returned $($invoke.StatusCode)" }
            $invokePayload = $invoke.Content | ConvertFrom-Json -NoEnumerate
            if ($null -eq $invokePayload -or $invokePayload -isnot [System.Array]) {
              throw "/invoke/system_list_open_in_tools did not return the expected JSON array success payload"
            }
            foreach ($tool in $invokePayload) {
              if (-not $tool.id -or -not $tool.label) {
                throw "/invoke/system_list_open_in_tools returned an invalid open-in tool envelope"
              }
            }

            $client = [System.Net.Http.HttpClient]::new()
            $client.Timeout = [TimeSpan]::FromSeconds(5)
            $client.DefaultRequestHeaders.Add("x-openducktor-app-token", $appToken)
            try {
              foreach ($path in @("events", "task-events")) {
                $response = $client.GetAsync("$backendUrl/$path", [System.Net.Http.HttpCompletionOption]::ResponseHeadersRead).GetAwaiter().GetResult()
                if (-not $response.IsSuccessStatusCode) { throw "/$path returned $([int]$response.StatusCode)" }
                if ($response.Content.Headers.ContentType.MediaType -ne "text/event-stream") { throw "/$path did not return text/event-stream" }
                $response.Dispose()
              }
            } finally {
              $client.Dispose()
            }

            $shutdown = Invoke-WebRequest -Uri "$backendUrl/shutdown" -Method Post -Headers @{ "x-openducktor-control-token" = $controlToken } -TimeoutSec 5
            if ($shutdown.StatusCode -ne 202) { throw "/shutdown returned $($shutdown.StatusCode)" }
            if (-not $process.WaitForExit(10000)) { throw "Web host did not exit after /shutdown" }
            $smokeFailed = $false
          } finally {
            if (-not $process.HasExited) { Stop-Process -Id $process.Id -Force }
            if ($smokeFailed) {
              if (Test-Path $stdoutLog) {
                Write-Host "--- web-host stdout ---"
                Get-Content $stdoutLog
              }
              if (Test-Path $stderrLog) {
                Write-Host "--- web-host stderr ---"
                Get-Content $stderrLog
              }
            }
          }
