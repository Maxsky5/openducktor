name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: 1.3.5
  CARGO_TERM_COLOR: always

jobs:
  react-doctor:
    name: React Doctor
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run React Doctor on changed desktop files
        uses: millionco/react-doctor@ec4a41fd827c29d79f9b27a588cde598e054d059 # main
        with:
          project: "@openducktor/desktop"
          diff: ${{ github.base_ref }}

  bun-quality:
    name: Bun Quality (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun download cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-${{ env.BUN_VERSION }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint workspaces
        run: bun run lint

      - name: Typecheck workspaces
        run: bun run typecheck

      - name: Test workspaces
        run: bun run test

      - name: Build workspaces
        run: bun run build

  tauri-rust-quality:
    name: Rust Workspace Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      CARGO_PROFILE_DEV_DEBUG: 0
      CARGO_PROFILE_TEST_DEBUG: 0

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          workspaces: |
            apps/desktop/src-tauri

      - name: Pre-fetch Rust dependencies
        run: cargo rust-fetch

      - name: Lint host crates
        run: cargo rust-lint-host

      - name: Run host crate unit tests
        run: cargo rust-test-host-unit

      - name: Setup Bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2.1.3
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Run host-application integration tests
        run: cargo rust-test-host-integration

      - name: Install Linux dependencies for Tauri
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev librsvg2-dev patchelf libayatana-appindicator3-dev

      - name: Lint Tauri app
        run: cargo rust-lint-tauri

      - name: Cross-platform config build check
        run: cargo check --manifest-path apps/desktop/src-tauri/Cargo.toml --locked --target x86_64-pc-windows-gnu -p host-infra-system

      - name: Run Tauri app tests
        run: cargo rust-test-tauri
