[package]
name = "openducktor-desktop"
version = "0.1.0"
description = "OpenDucktor Desktop"
authors = ["OpenDucktor"]
edition = "2021"

[lib]
name = "openducktor_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
anyhow = "1"
chrono = { version = "0.4", features = ["serde"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
tokio = { version = "1", features = ["rt-multi-thread", "process", "sync", "macros", "time"] }
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt", "json"] }
uuid = { version = "1", features = ["serde", "v4"] }
ctrlc = "3"

host-domain = { path = "crates/host-domain" }
host-application = { path = "crates/host-application" }
host-infra-beads = { path = "crates/host-infra-beads" }
host-infra-system = { path = "crates/host-infra-system" }
