appId: com.openducktor.app
productName: OpenDucktor
asar: true

directories:
  output: release

afterAllArtifactBuild: scripts/print-package-artifacts.cjs

files:
  - dist/**/*

extraResources:
  - from: build/sidecars
    to: bin
  - from: resources/icon.ico
    to: icon.ico
  - from: resources/icon.icns
    to: icon.icns
  - from: resources/icon.png
    to: icon.png

extraMetadata:
  main: dist/main.js
  dependencies: {}

mac:
  artifactName: OpenDucktor-Electron-${version}-${os}-${arch}.${ext}
  icon: resources/icon.icns
  binaries:
    - Contents/Resources/bin/openducktor-mcp
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  target:
    - dmg
    - zip

win:
  artifactName: OpenDucktor-Electron-${version}-${os}-${arch}.${ext}
  icon: resources/icon.ico
  target:
    - nsis
    - zip

linux:
  category: Development
  artifactName: OpenDucktor-Electron-${version}-${os}-${arch}.${ext}
  icon: resources/icon.png
  target:
    - AppImage
    - deb

deb:
  packageName: openducktor
