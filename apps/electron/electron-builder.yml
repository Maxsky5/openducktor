appId: com.openducktor.app
productName: OpenDucktor
asar: true

directories:
  output: release

afterAllArtifactBuild: scripts/print-package-artifacts.cjs

files:
  - dist/**/*

extraResources:
  - from: build/sidecars
    to: bin

extraMetadata:
  main: dist/main.js
  dependencies: {}

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip

win:
  target:
    - nsis
    - zip

linux:
  category: Development
  target:
    - AppImage
    - deb
