appId: com.openducktor.app
productName: OpenDucktor
asar: true
asarUnpack:
  - node_modules/node-pty/**/*

publish:
  provider: github
  owner: Maxsky5
  repo: openducktor

directories:
  output: release

afterAllArtifactBuild: scripts/print-package-artifacts.cjs

files:
  - dist/**/*
  - node_modules/node-pty/**/*
  - "!node_modules/node-pty/scripts/**/*"

extraResources:
  - from: build/sidecars
    to: bin
  - from: resources/icon.ico
    to: icon.ico
  - from: resources/icon.icns
    to: icon.icns
  - from: resources/icon.png
    to: icon.png

extraMetadata:
  main: dist/main.js
  dependencies:
    node-pty: 1.2.0-beta.14

mac:
  artifactName: OpenDucktor-${version}-${os}-${arch}.${ext}
  icon: resources/icon.icns
  minimumSystemVersion: "12.0"
  binaries:
    - Contents/Resources/bin/openducktor-mcp
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  target:
    - dmg
    - zip

win:
  artifactName: OpenDucktor-${version}-${os}-${arch}.${ext}
  icon: resources/icon.ico
  target:
    - nsis
    - zip

linux:
  category: Development
  executableName: openducktor
  artifactName: OpenDucktor-${version}-${os}-${arch}.${ext}
  icon: resources/icon.png
  target:
    - AppImage
    - deb

deb:
  packageName: openducktor
