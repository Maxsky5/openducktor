appId: com.openducktor.app
productName: OpenDucktor
asar: true

directories:
  output: release

afterAllArtifactBuild: scripts/print-package-artifacts.cjs

files:
  - dist/**/*

extraResources:
  - from: build/sidecars
    to: bin

extraMetadata:
  main: dist/main.js
  dependencies: {}

mac:
  artifactName: OpenDucktor-Electron-${version}-${os}-${arch}.${ext}
  binaries:
    - Contents/Resources/bin/openducktor-mcp
  category: public.app-category.developer-tools
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  target:
    - dmg
    - zip

win:
  artifactName: OpenDucktor-Electron-${version}-${os}-${arch}.${ext}
  target:
    - nsis
    - zip

linux:
  category: Development
  artifactName: OpenDucktor-Electron-${version}-${os}-${arch}.${ext}
  target:
    - AppImage
    - deb

deb:
  packageName: openducktor
